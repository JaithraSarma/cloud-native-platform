apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cloud-platform-staging

namePrefix: staging-

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi

  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

images:
  - name: ACR_LOGIN_SERVER/cloud-platform-api
    newName: acrcloudplatformstaging.azurecr.io/cloud-platform-api
    newTag: staging-latest
  - name: ACR_LOGIN_SERVER/cloud-platform-frontend
    newName: acrcloudplatformstaging.azurecr.io/cloud-platform-frontend
    newTag: staging-latest

commonLabels:
  environment: staging

commonAnnotations:
  description: "Staging environment - Cloud Native Platform"
